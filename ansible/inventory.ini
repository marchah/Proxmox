[proxmox]
# Connection details come from the environment so they don't live in the repo:
#   PVE_HOST  Proxmox host/IP to connect to   (default: the SSH alias "pve")
#   PVE_USER  SSH user on the Proxmox host    (default: root)
# Set them per-machine, e.g. in your shell profile or a sourced env file:
#   export PVE_HOST=<proxmox-ip>
#   export PVE_USER=root
# If PVE_HOST is unset it falls back to the literal alias "pve", so a
# `Host pve` block in ~/.ssh/config (with HostName/User/IdentityFile) is enough
# on its own — see the README.
pve ansible_host="{{ lookup('env', 'PVE_HOST') | default('pve', true) }}" ansible_user="{{ lookup('env', 'PVE_USER') | default('root', true) }}"

# SSH-key auth. The key is NOT named here so this inventory stays generic across
# machines — define the per-PC key in your ~/.ssh/config and make the block match
# the IP/alias Ansible connects to, e.g.:
#   Host pve <proxmox-ip>
#       HostName <proxmox-ip>
#       User root
#       IdentityFile ~/.ssh/<this-pc's-key>
# (A default-named key like ~/.ssh/id_ed25519 is picked up automatically.)
# For password auth instead: add ansible_ssh_pass=... or run ansible-playbook with -k.
