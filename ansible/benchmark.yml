---
# One-command LLM runtime benchmark batch, driven from this machine.
# Engine: llamacpp (see the `runtimes` map below; the prior lmstudio path was removed with the RX 6700 XT).
#
#   ansible-playbook -i ansible/inventory.ini ansible/benchmark.yml \
#     -e @ansible/secrets.yml -e parallel=4
#
# It pushes the LOCAL bench-runner suite to the Proxmox host (so runs use your
# latest, even uncommitted code), provisions CT 200 if it is missing, injects
# HF_TOKEN, (re)loads the model at the requested --parallel, runs the batch, and
# fetches the result folders back into rx-6700-xt/results/<runtime>/parallel-<n>/.
#
# The containers have no SSH of their own, so tasks act on them via `pct` on the
# Proxmox host (this is the "light" orchestrator around the existing bash scripts).
- name: LLM runtime benchmark batch
  hosts: proxmox
  gather_facts: false

  vars:
    bench_vmid: 200
    gpu_vmid: 120
    # Which inference engine CT 120 is running. Selects the reload command, results
    # label, and target telemetry process patterns from `runtimes` below. The V620
    # runs llamacpp — the only supported engine here; the prior RX 6700 XT's lmstudio
    # path was removed when that card was decommissioned.
    runtime: llamacpp
    # Default to 4 slots = the operational CT 120 default, so a plain `make bench`
    # never downgrades the running model. Override with -e parallel=1 for a
    # single-slot run.
    parallel: 4
    # Served model id (== llama-server --alias on CT 120). The bench-runner also
    # auto-detects it from /v1/models, but the reload/label/telemetry paths use it.
    model_key: qwen3.6-35b-a3b
    # 256k total — MUST match the CT 120 default. Reloads and the post-batch restore
    # use this value, so a smaller number here silently downgrades production context
    # on every `make bench`. At parallel 4 that is 64k per slot.
    model_context: 262144
    reload_model: true
    # Per-engine reload command + labels. The reload command is re-templated by
    # Ansible, so its inner {{ model_key }}/{{ model_context }}/{{ parallel }}
    # resolve at run time.
    runtimes:
      llamacpp:
        label: llamacpp
        target_process_patterns: "llama-server,python"
        # llama-server sets context/parallel at start, so "reload" = restart via
        # the helper the llama.cpp container ships (blocks until healthy).
        # Absolute path: the Ubuntu container's PATH omits /usr/local/bin.
        reload_cmd: "/usr/local/bin/llamacpp-reload {{ model_context }} {{ parallel }}"
        version_cmd: "/opt/llamacpp/current/llama-server --version 2>&1"
    runtime_label: "{{ runtimes[runtime].label }}"
    model_reload_cmd: "{{ runtimes[runtime].reload_cmd }}"
    # Optional host-orchestrated context-length sweep (reloads CT 120 per context,
    # benches it via the host-telemetry sidecar). Off by default; enable with
    # -e context_sweep=true. Set benchmarks=[] to run only the context sweep.
    context_sweep: false
    context_sweep_contexts: "4096 16384 32768 65536"
    repo_root: "{{ playbook_dir }}/.."
    host_suite_dir: /tmp/proxmox-bench
    results_dest: "{{ playbook_dir }}/../pro-v620/results/{{ runtime_label }}/parallel-{{ parallel }}"
    benchmarks:
      - "llm-bench-baseline"
      - "llm-bench-sweep concurrency --points 1 2 4 8 16 --requests 32"
      - "llm-bench-sweep input-length --points 128 512 2048 8192 32768 --output-tokens 32"
      - "llm-bench-soak"

  tasks:
    - name: Wipe any previous suite copy on the host
      ansible.builtin.file:
        path: "{{ host_suite_dir }}"
        state: absent

    - name: Push the local bench-runner suite to the host (latest, incl. uncommitted)
      ansible.builtin.copy:
        src: "{{ repo_root }}/bench-runner/"
        dest: "{{ host_suite_dir }}/"
        mode: preserve

    - name: Make the host orchestration scripts executable
      ansible.builtin.file:
        path: "{{ host_suite_dir }}/host/{{ item }}"
        mode: "0755"
      loop:
        - run-context-sweep.sh
        - run-with-host-telemetry.sh
        - run-with-target-telemetry.sh

    - name: Capture the local source commit (controller)
      delegate_to: localhost
      ansible.builtin.command: "git -C {{ repo_root }} rev-parse HEAD"
      register: local_git_commit
      changed_when: false
      failed_when: false

    - name: Capture the local working-tree dirtiness (controller)
      delegate_to: localhost
      ansible.builtin.command: "git -C {{ repo_root }} status --short"
      register: local_git_status
      changed_when: false
      failed_when: false

    # Capture the engine build from the model container itself (CT 120), where the
    # binary actually lives — the bench-runner can't see it. The version_cmd merges
    # stderr (llama-server prints to it) but does NOT pipe to head, so its real exit
    # code survives; build-info only records the first output line when rc == 0, so
    # a loader/missing-file error never masquerades as an engine version. Best
    # effort: empty if CT 120 is down or the command fails.
    - name: Capture the model engine version from CT 120 (best effort)
      ansible.builtin.command:
        argv: [pct, exec, "{{ gpu_vmid }}", "--", bash, "-lc", "{{ runtimes[runtime].version_cmd }}"]
      register: engine_version_raw
      changed_when: false
      failed_when: false

    - name: Record build-info into the host suite copy (provenance for runs)
      ansible.builtin.copy:
        dest: "{{ host_suite_dir }}/config/build-info.json"
        mode: "0644"
        content: |
          {
            "git_commit": "{{ local_git_commit.stdout | default('') | trim }}",
            "git_dirty": {{ ((local_git_status.stdout | default('')) | trim | length > 0) | to_json }},
            "source": "ansible/benchmark.yml",
            "parallel": {{ parallel | int }},
            "runtime": {{ runtime | to_json }},
            "engine_version": {{ ( ((engine_version_raw.stdout | default('')).splitlines() | first | default('') | trim) if (engine_version_raw.rc | default(1)) == 0 else '' ) | to_json }}
          }

    - name: Check whether the bench-runner LXC already exists
      ansible.builtin.command: "pct status {{ bench_vmid }}"
      register: ct_status
      failed_when: false
      changed_when: false

    - name: Provision the bench-runner LXC (only if missing)
      ansible.builtin.command: "bash ./create-lxc-bench-runner.sh"
      args:
        chdir: "{{ host_suite_dir }}"
      when: ct_status.rc != 0

    # Provisioning only installs the suite at container-creation time, so an
    # existing CT 200 would otherwise keep running whatever code it was born
    # with. Always overlay the latest scripts/config so runs use the code we
    # just pushed. A tar overlay (not a wipe) preserves the provisioning-time
    # config/local-model.env, which is not part of the repo.
    - name: Sync the latest suite into the container (overlay; preserves local-model.env)
      ansible.builtin.shell: |
        set -e
        cd "{{ host_suite_dir }}"
        tar -czf /tmp/bench-suite.tgz scripts config $(ls -1 ./*.md 2>/dev/null | xargs -n1 basename)
        pct push {{ bench_vmid }} /tmp/bench-suite.tgz /tmp/bench-suite.tgz
        pct exec {{ bench_vmid }} -- bash -lc '
          install -d -o bench -g bench /opt/bench-runner &&
          tar -xzf /tmp/bench-suite.tgz -C /opt/bench-runner &&
          rm -f /tmp/bench-suite.tgz &&
          chown -R bench:bench /opt/bench-runner &&
          chmod +x /opt/bench-runner/scripts/benchmarks/*.sh /opt/bench-runner/scripts/benchmarks/*.py'
        rm -f /tmp/bench-suite.tgz
      changed_when: true

    - name: Render the HF_TOKEN fragment on the host
      ansible.builtin.copy:
        dest: "{{ host_suite_dir }}/hf.env"
        content: "HF_TOKEN={{ hf_token }}\n"
        mode: "0600"
      no_log: true
      when: hf_token | default('') | length > 0

    - name: Inject HF_TOKEN into the container's /etc/bench-runner.env (idempotent)
      ansible.builtin.shell: |
        set -e
        pct push {{ bench_vmid }} {{ host_suite_dir }}/hf.env /tmp/hf.env
        pct exec {{ bench_vmid }} -- bash -lc 'sed -i "/^HF_TOKEN=/d" /etc/bench-runner.env 2>/dev/null || true; cat /tmp/hf.env >> /etc/bench-runner.env; rm -f /tmp/hf.env; chmod 600 /etc/bench-runner.env'
      no_log: true
      when: hf_token | default('') | length > 0

    # CT 200 reaches CT 120 via the MODEL_API_URL + MODEL_IDENTIFIER baked into its
    # env at provisioning (the overlay preserves them). Both are auto-detected ONLY
    # at provision time, so they go stale later: DHCP can hand CT 120 a new IP, and a
    # model swap changes the served id. Re-point BOTH every run — URL -> current
    # IP:1234, MODEL_IDENTIFIER -> model_key — so the batch targets the live endpoint
    # and preflight matches the served model (else an existing CT 200 fails preflight).
    - name: Discover the model container's current IP
      ansible.builtin.command:
        argv: [pct, exec, "{{ gpu_vmid }}", "--", hostname, -I]
      register: gpu_ip
      changed_when: false
      failed_when: false

    - name: Point the bench-runner at CT 120's current endpoint
      ansible.builtin.command:
        argv:
          - pct
          - exec
          - "{{ bench_vmid }}"
          - --
          - bash
          - -lc
          - >-
            sed -i -E
            -e 's#(MODEL_API_URL:=)http://[^"/]+/v1#\1http://{{ gpu_ip.stdout.split()[0] }}:1234/v1#'
            -e 's#(MODEL_IDENTIFIER:=)[^}"]*#\1{{ model_key }}#'
            /etc/bench-runner.env /opt/bench-runner/config/local-model.env
      changed_when: true
      when: gpu_ip.stdout | default('') | trim | length > 0

    - name: (Re)load the model with the requested parallel slots
      ansible.builtin.command:
        argv: [pct, exec, "{{ gpu_vmid }}", "--", bash, "-lc", "{{ model_reload_cmd }}"]
      changed_when: true
      when: reload_model | bool

    - name: List result runs before the batch
      ansible.builtin.command:
        argv: [pct, exec, "{{ bench_vmid }}", "--", bash, "-lc", "ls -1 /results 2>/dev/null || true"]
      register: results_before
      changed_when: false

    # Each item reloads the model first, then runs the benchmark with target-side
    # telemetry (see ansible/benchmark_item.yml). The per-item reload stops a
    # cliff-corrupted model from poisoning later benchmarks; failures are
    # collected in batch_item_results and surfaced at the end, after results are
    # fetched, so the whole batch still runs. The always-block restores a clean
    # model even if the last item left it in the sticky cliff-corrupted state.
    - name: Run the benchmark batch (per-item reload + target telemetry)
      block:
        - name: Run each benchmark item
          ansible.builtin.include_tasks: benchmark_item.yml
          loop: "{{ benchmarks }}"
      always:
        # Don't let a restore failure abort the play before results are fetched;
        # it's reported at the end alongside any benchmark failures.
        - name: Restore a clean model after the batch (cliff safety)
          ansible.builtin.command:
            argv: [pct, exec, "{{ gpu_vmid }}", "--", bash, "-lc", "{{ model_reload_cmd }}"]
          changed_when: true
          register: post_batch_restore
          failed_when: false
          when: reload_model | bool and (benchmarks | length > 0)

    - name: List result runs after the batch
      ansible.builtin.command:
        argv: [pct, exec, "{{ bench_vmid }}", "--", bash, "-lc", "ls -1 /results"]
      register: results_after
      changed_when: false

    - name: Determine the new run folders
      ansible.builtin.set_fact:
        new_runs: "{{ results_after.stdout_lines | difference(results_before.stdout_lines) }}"

    - name: Archive the new runs inside the container
      ansible.builtin.command:
        argv: [pct, exec, "{{ bench_vmid }}", "--", bash, "-lc", "cd /results && tar -czf /tmp/bench-results.tgz {{ new_runs | join(' ') }}"]
      when: new_runs | length > 0

    - name: Pull the archive to the Proxmox host
      ansible.builtin.command: "pct pull {{ bench_vmid }} /tmp/bench-results.tgz {{ host_suite_dir }}/bench-results.tgz"
      when: new_runs | length > 0

    - name: Fetch the archive to this machine
      ansible.builtin.fetch:
        src: "{{ host_suite_dir }}/bench-results.tgz"
        dest: "/tmp/proxmox-bench-results.tgz"
        flat: true
      when: new_runs | length > 0

    - name: Ensure the local results dir exists
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ results_dest }}"
        state: directory
      when: new_runs | length > 0

    - name: Extract the runs locally
      delegate_to: localhost
      # macOS ships BSD tar, which lacks the GNU options the unarchive module
      # requires; extract directly (BSD tar unpacks .tgz fine).
      ansible.builtin.command:
        argv: [tar, -xzf, /tmp/proxmox-bench-results.tgz, -C, "{{ results_dest }}"]
      changed_when: true
      when: new_runs | length > 0

    # --- Optional: host-orchestrated context-length sweep -------------------
    - name: Run the context-length sweep (optional)
      ansible.builtin.command: "bash {{ host_suite_dir }}/host/run-context-sweep.sh"
      args:
        chdir: "{{ host_suite_dir }}"
      environment:
        GPU_VMID: "{{ gpu_vmid }}"
        BENCH_VMID: "{{ bench_vmid }}"
        RUNTIME: "{{ runtime }}"
        MODEL_KEY: "{{ model_key }}"
        MODEL_PARALLEL: "{{ parallel }}"
        CONTEXTS: "{{ context_sweep_contexts }}"
        OUT_DIR: "{{ host_suite_dir }}/context-sweep"
      when: context_sweep | bool

    - name: Archive the context-sweep output
      ansible.builtin.command: "tar -czf {{ host_suite_dir }}/context-sweep.tgz -C {{ host_suite_dir }} context-sweep"
      when: context_sweep | bool

    - name: Fetch the context-sweep archive to this machine
      ansible.builtin.fetch:
        src: "{{ host_suite_dir }}/context-sweep.tgz"
        dest: "/tmp/proxmox-context-sweep.tgz"
        flat: true
      when: context_sweep | bool

    - name: Ensure the local runtime results dir exists
      delegate_to: localhost
      ansible.builtin.file:
        path: "{{ playbook_dir }}/../pro-v620/results/{{ runtime_label }}"
        state: directory
      when: context_sweep | bool

    - name: Extract the context sweep locally
      delegate_to: localhost
      ansible.builtin.command:
        argv: [tar, -xzf, /tmp/proxmox-context-sweep.tgz, -C, "{{ playbook_dir }}/../pro-v620/results/{{ runtime_label }}"]
      changed_when: true
      when: context_sweep | bool

    - name: Restore the model to the configured context/parallel after the sweep
      ansible.builtin.command:
        argv: [pct, exec, "{{ gpu_vmid }}", "--", bash, "-lc", "{{ model_reload_cmd }}"]
      changed_when: true
      when: context_sweep | bool and reload_model | bool

    - name: Summary
      ansible.builtin.debug:
        msg: >-
          {{ (new_runs | length) }} new run(s) fetched into {{ results_dest }}:
          {{ new_runs | join(', ') if new_runs else '(none)' }}

    # Results are already fetched above, so fail loudly *now* if any benchmark
    # exited non-zero or the post-batch model restore failed — rather than letting
    # a red run masquerade as success.
    - name: Fail if any benchmark failed or the model restore failed
      vars:
        failed_benchmarks: "{{ (batch_item_results | default([])) | selectattr('rc', 'ne', 0) | map(attribute='item') | list }}"
        restore_failed: "{{ post_batch_restore is defined and (post_batch_restore.rc | default(0)) != 0 }}"
      ansible.builtin.fail:
        msg: >-
          Run had failures (results still fetched) —
          failed benchmark(s): {{ failed_benchmarks | join('; ') if failed_benchmarks else 'none' }};
          post-batch model restore failed: {{ restore_failed }}{{ ' (reload CT ' ~ gpu_vmid ~ ' manually)' if restore_failed else '' }}.
      when: (failed_benchmarks | length > 0) or restore_failed
