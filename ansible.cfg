[defaults]
inventory = ansible/inventory.ini
host_key_checking = True
# The host's python3 is found automatically; don't warn that a future install could change it.
interpreter_python = auto_silent

[ssh_connection]
# accept-new: trust a host's key on first connect (TOFU), but still refuse if a
# known host's key changes. ControlMaster speeds up the many pct-exec tasks.
ssh_args = -o StrictHostKeyChecking=accept-new -o ControlMaster=auto -o ControlPersist=60s
