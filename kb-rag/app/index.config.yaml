# kb-rag index configuration.
# Process env overrides these (KB_REPO_DIR, KB_DB_PATH, KB_EMBED_MODEL, KB_EMBED_DIM, ...).

repo_url: git@github.com:marchah/CognitiveStack.git
branch: main
repo_dir: /opt/kb-rag/data/repo
db_path: /opt/kb-rag/data/kb.sqlite

# Embedding model — CPU (fastembed/ONNX). Changing this or embed_dim requires `kb-reindex --full`.
embed_model: BAAI/bge-small-en-v1.5
embed_dim: 384
query_prefix: "Represent this sentence for searching relevant passages: "

# Corpus policy (gitignore-style globs). A file is indexed if it matches `include`
# AND not `exclude`. Only *.md is ever eligible.
include:
  - "*.md"
  - "coding-architectures/*.md"
  - "coding-paradigms-and-patterns/*.md"
exclude:
  - "jobs/**"            # daily automation reports — separate corpus for now
  - "hardware.md"        # personal
  - "hardware/**"        # personal
  - "gpu-llm-upgrade-guide.md"      # personal purchasing/upgrade planning
  - "claude-gpu-recommendation.md"  # personal GPU purchasing rec
  - "hermes/**"          # agent config/automation, not knowledge
  - "README.md"          # KB nav/meta (matches at any depth)
  - "INDEX.md"
  - "SCHEMA.md"
  - "AGENT_GUIDE.md"

defaults:
  top_k: 8
  mode: hybrid
